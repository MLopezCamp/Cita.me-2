services:
  redis:
    image: redis:7-alpine
    container_name: citame-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --protected-mode no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - citame-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: citame-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      logging: "promtail"
    networks:
      - citame-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: citame-backend
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: sqlite+aiosqlite:////data/citame.db
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - db_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      logging: "promtail"
    networks:
      - citame-net

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: citame-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: sqlite+aiosqlite:////data/citame.db
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - db_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      logging: "promtail"
    networks:
      - citame-net

  db_viewer:
    build:
      context: ./db_viewer
      dockerfile: Dockerfile
    container_name: citame-dbviewer
    ports:
      - "8080:8080"
    environment:
      DATABASE_PATH: /data/citame.db
    volumes:
      - db_data:/data
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      logging: "promtail"
    networks:
      - citame-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: citame-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      logging: "promtail"
    networks:
      - citame-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: citame-rediscommander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
    command: sh -c "sleep 5 && node ./bin/redis-commander --redis-host redis --redis-port 6379 --redis-db 0"
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure:3
    networks:
      - citame-net

  loki:
    image: grafana/loki:3.0.0
    container_name: citame-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - citame-net

  alloy:
    image: grafana/alloy:v1.1.0
    container_name: citame-alloy
    ports:
      - "12345:12345"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      - loki
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - citame-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: citame-grafana
    ports:
      - "3200:3000"
    environment:
      # Credenciales del admin — cambia la contraseña si lo deseas
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: citame2024
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Abrir el dashboard de trazabilidad como pantalla de inicio
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/citame.json
      GF_INSTALL_PLUGINS: grafana-lokiexplore-app
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning declarativo: datasources + dashboard persisten aunque se borre el volumen
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - citame-net

  # ✅ PORTAINER — Gestión visual de contenedores
  portainer:
    image: portainer/portainer-ce:latest
    container_name: citame-portainer
    ports:
      - "9000:9000"
      - "8001:8000"  # Edge agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    restart: unless-stopped
    networks:
      - citame-net

volumes:
  redis_data:
  rabbitmq_data:
  db_data:
  loki_data:
  grafana_data:
  portainer_data:  # ✅ Nuevo volumen

networks:
  citame-net:
    driver: bridge