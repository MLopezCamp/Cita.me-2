name: Build and Publish Images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/citame

jobs:
  build:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-worker:latest

      - name: Build and push db_viewer
        uses: docker/build-push-action@v6
        with:
          context: ./db_viewer
          push: true
          cache-from: type=gha,scope=db_viewer
          cache-to: type=gha,mode=max,scope=db_viewer
          tags: |
            ${{ env.IMAGE_PREFIX }}-db-viewer:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-db-viewer:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Summary
        run: |
          echo "### Imagenes publicadas en Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-db-viewer:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Para desplegar:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.prod.yml pull" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.prod.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
