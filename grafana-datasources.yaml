apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      timeout: 60
      maxLines: 1000

  - name: Alloy Metrics
    type: prometheus
    access: proxy
    url: http://alloy:12345    
    editable: false